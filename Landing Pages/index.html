<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aethon Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #08080f;
      --card: #0f0f1a;
      --border: rgba(255,255,255,0.08);
      --accent: #ff5e00;
      --accent-dim: rgba(255,94,0,0.13);
      --text: #f0eee8;
      --muted: #666;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,94,0,0.4); }
      60%      { box-shadow: 0 0 0 10px rgba(255,94,0,0); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#ff5e00",
  "cta": "Book a Free Strategy Call",
  "calendly": "https:\/\/calendly.com\/jahanp-aethonintelligence\/30min"
}/*EDITMODE-END*/;

function useTweaks() {
  const [t, setT] = useState(TWEAK_DEFAULTS);
  const [open, setOpen] = useState(false);
  useEffect(() => {
    document.documentElement.style.setProperty('--accent', t.accent);
    document.documentElement.style.setProperty('--accent-dim', t.accent + '22');
  }, [t.accent]);
  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setOpen(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);
  const set = (k, v) => {
    setT(prev => {
      const next = { ...prev, [k]: v };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
      return next;
    });
  };
  return { t, open, set };
}

/* ── QUIZ ─────────────────────────────────── */
const QS = [
  { q: 'What type of business do you run?', opts: ['Home Services (HVAC, Plumbing, Roofing…)', 'Real Estate / Mortgage', 'Med Spa / Health & Wellness', 'Legal / Financial Services', 'Other Local Business'] },
  { q: 'Where are you located?', type: 'text', placeholder: 'City, State' },
  { q: 'How are you currently getting clients?', opts: ['Paid ads (Google, Meta)', 'Word of mouth / referrals', 'Organic social', 'Not consistently — that\'s the problem'] },
  { q: 'What\'s your biggest challenge right now?', opts: ['Not enough leads', 'Leads don\'t convert', 'Too much time on follow-up', 'All of the above — I need help'] },
];

function Quiz({ cta, calendly }) {
  const [step, setStep] = useState(0);
  const [ans, setAns] = useState({});
  const [txt, setTxt] = useState('');
  const [done, setDone] = useState(false);
  const q = QS[step];

  const next = (val) => {
    setAns(a => ({ ...a, [step]: val }));
    if (step < QS.length - 1) setTimeout(() => setStep(s => s + 1), 220);
    else setTimeout(() => setDone(true), 220);
  };

  if (done) return (
    <div style={{ textAlign: 'center', padding: '8px 0', animation: 'fadeUp 0.4s ease both' }}>
      <div style={{
        width: 48, height: 48, borderRadius: '50%',
        background: 'var(--accent)', margin: '0 auto 16px',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 20, color: '#fff',
      }}>✓</div>
      <p style={{ fontFamily: 'Nunito', fontWeight: 800, fontSize: 22, marginBottom: 8 }}>You're a great fit.</p>
      <p style={{ color: 'var(--muted)', fontSize: 14, marginBottom: 24, lineHeight: 1.6 }}>
        We take limited clients each month. Book your free strategy call now.
      </p>
      <a href={calendly} target="_blank" rel="noreferrer" style={{
        display: 'inline-block', padding: '14px 36px',
        background: 'var(--accent)', color: '#fff',
        fontFamily: 'Nunito', fontWeight: 700, fontSize: 15,
        textDecoration: 'none', borderRadius: 6,
        animation: 'pulse 2.2s infinite',
      }}>
        {cta} →
      </a>
    </div>
  );

  return (
    <div key={step} style={{ animation: 'fadeUp 0.28s ease both' }}>
      {/* progress bar */}
      <div style={{ height: 2, background: 'var(--border)', borderRadius: 2, marginBottom: 20 }}>
        <div style={{
          height: '100%', borderRadius: 2, background: 'var(--accent)',
          width: `${(step / QS.length) * 100}%`, transition: 'width 0.35s ease',
        }} />
      </div>
      <p style={{ fontSize: 11, color: 'var(--muted)', marginBottom: 10, letterSpacing: '0.06em' }}>
        {step + 1} / {QS.length}
      </p>
      <p style={{ fontFamily: 'Nunito', fontWeight: 700, fontSize: 17, marginBottom: 16, lineHeight: 1.35 }}>
        {q.q}
      </p>
      {q.type === 'text' ? (
        <div style={{ display: 'flex', gap: 8 }}>
          <input autoFocus value={txt} onChange={e => setTxt(e.target.value)}
            onKeyDown={e => e.key === 'Enter' && txt.trim() && next(txt)}
            placeholder={q.placeholder}
            style={{
              flex: 1, background: 'rgba(255,255,255,0.05)',
              border: '1px solid var(--border)', color: '#fff',
              padding: '11px 14px', fontSize: 14, borderRadius: 6,
              fontFamily: 'Nunito Sans', outline: 'none',
            }} />
          <button onClick={() => txt.trim() && next(txt)} style={{
            background: 'var(--accent)', color: '#fff', border: 'none',
            padding: '11px 20px', fontFamily: 'Nunito', fontWeight: 700,
            fontSize: 13, cursor: 'pointer', borderRadius: 6,
          }}>→</button>
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {q.opts.map((o, i) => (
            <button key={i} onClick={() => next(o)} style={{
              background: ans[step] === o ? 'var(--accent-dim)' : 'rgba(255,255,255,0.03)',
              border: `1px solid ${ans[step] === o ? 'var(--accent)' : 'var(--border)'}`,
              color: '#fff', padding: '11px 14px', fontSize: 13,
              fontFamily: 'Nunito Sans', cursor: 'pointer', textAlign: 'left',
              borderRadius: 6, transition: 'all 0.15s',
            }}
            onMouseEnter={e => { if (ans[step] !== o) e.currentTarget.style.borderColor = 'rgba(255,255,255,0.18)'; }}
            onMouseLeave={e => { if (ans[step] !== o) e.currentTarget.style.borderColor = 'var(--border)'; }}
            >{o}</button>
          ))}
        </div>
      )}
      {step > 0 && (
        <button onClick={() => setStep(s => s - 1)} style={{
          background: 'none', border: 'none', color: 'var(--muted)',
          fontSize: 12, cursor: 'pointer', marginTop: 12, fontFamily: 'Nunito Sans',
        }}>← back</button>
      )}
    </div>
  );
}

/* ── VIDEO CARD ───────────────────────────── */

  return (

      <div

          transform: hov ? 'scale(1.1)' : 'scale(1)',
        }}>

          </svg>

        <div style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 2, background: 'var(--accent)' }} />
      </div>
    </div>
  );
}

/* ── TWEAKS ───────────────────────────────── */
function TweaksPanel({ t, set }) {

            style={{ display: 'block', marginTop: 4, width: '100%', background: '#1a1a1a', border: '1px solid #2a2a2a', color: '#fff', padding: '6px 10px', fontSize: 12, borderRadius: 5, fontFamily: 'Nunito Sans' }} />
        </label>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</body>
</html>
